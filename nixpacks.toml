# Remotion needs ffmpeg for video encoding and chromium for rendering.
# nixpacks installs these system packages on the Railway build server.
[phases.setup]
nixPkgs = ["nodejs_20", "nodePackages.npm", "ffmpeg", "chromium", "nss", "nspr", "atk", "at-spi2-atk", "xorg.libX11", "xorg.libXcomposite", "xorg.libXdamage", "xorg.libXext", "xorg.libXfixes", "xorg.libXrandr", "libxkbcommon", "mesa", "pango", "cairo", "alsa-lib", "dbus"]
